title: Alice over Sora - Full Anchor Alignment Test v8
description: >-
  Full mapped-anatomy refinement of the stable v7 Alice-on-Sora re-rig.
  Aligns Alice's primary body regions to Sora's exact bind anchors across the
  base MDLS and both remastered CVBL streams while preserving rigid skirt,
  hair, finger, and sleeve safety groups. This isolated visual test does not
  replace MSET, Lua, gameplay, collision events, effects, or weapons.
